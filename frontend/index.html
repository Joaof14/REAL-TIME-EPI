<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detecção de EPI - MVP</title>
    <style>
        body {
            margin: 0; padding: 20px;
            font-family: Arial, sans-serif;
            background: #1a1a1a; color: white;
            display: flex; flex-direction: column; align-items: center;
        }
        .container {
            position: relative;
            width: 640px; height: 480px;
            max-width: 100%;
            border: 3px solid #333; border-radius: 8px;
            overflow: hidden; background: #000;
        }
        /* O vídeo fica na base */
        video {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1; object-fit: cover;
        }
        /* O canvas fica em cima do vídeo, transparente */
        #canvas-overlay {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2; pointer-events: none;
            background: transparent !important;
        }
        .controls { margin: 15px 0; display: flex; gap: 10px; align-items: center; }
        button {
            padding: 10px 20px; border: none; border-radius: 5px;
            font-weight: bold; cursor: pointer;
        }
        #start-btn { background: #007bff; color: white; }
        #stop-btn { background: #dc3545; color: white; }
        #status { font-size: 0.9rem; color: #bbb; }
        #alerts-panel {
            width: 100%; max-width: 640px;
            background: #252525; padding: 15px; border-radius: 8px;
            border-left: 5px solid #ffc107;
        }
        .alert-item { color: #ffeb3b; margin: 5px 0; font-family: monospace; }
    </style>
</head>
<body>
    <h2>👷 Monitoramento de EPI</h2>
    
    <div class="container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas-overlay"></canvas>
    </div>
    
    <div class="controls">
        <button id="start-btn">Ligar Câmera</button>
        <button id="stop-btn" disabled>Desligar</button>
        <span id="status">⚪ Offline</span>
    </div>
    
    <div id="alerts-panel">
        <strong>Histórico de Alertas:</strong>
        <div id="alerts-list"></div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvasOverlay = document.getElementById('canvas-overlay');
        const ctx = canvasOverlay.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const statusSpan = document.getElementById('status');
        const alertsList = document.getElementById('alerts-list');

        const captureCanvas = document.createElement('canvas');
        const captureCtx = captureCanvas.getContext('2d');

        let ws = null;
        let stream = null;
        let sendInterval = null;

        async function start() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    canvasOverlay.width = video.videoWidth;
                    canvasOverlay.height = video.videoHeight;
                    captureCanvas.width = video.videoWidth;
                    captureCanvas.height = video.videoHeight;
                };
                connect();
                startBtn.disabled = true; stopBtn.disabled = false;
            } catch (e) { alert("Erro ao acessar câmera."); }
        }

        function connect() {
            const url = `${window.location.protocol === 'https:' ? 'wss' : 'ws'}://${window.location.host}/ws`;
            ws = new WebSocket(url);
            ws.onopen = () => { 
                statusSpan.textContent = "🟢 Monitorando..."; 
                sendInterval = setInterval(sendFrame, 150);
            };
            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                draw(data.detections);
                if (data.alerts.length > 0) logAlert(data.alerts[0].message);
            };
            ws.onclose = () => { statusSpan.textContent = "⚪ Desconectado"; clearInterval(sendInterval); };
        }

        function sendFrame() {
            if (ws?.readyState === 1 && video.readyState === 4) {
                captureCtx.drawImage(video, 0, 0);
                ws.send(captureCanvas.toDataURL('image/jpeg', 0.6));
            }
        }

        function draw(detections) {
            ctx.clearRect(0, 0, canvasOverlay.width, canvasOverlay.height);
            detections.forEach(d => {
                const color = d.class_name.includes('mask') || d.class_name.includes('De máscara') ? '#4caf50' : '#2196f3';
                ctx.strokeStyle = color;
                ctx.lineWidth = 3;
                ctx.strokeRect(d.x1, d.y1, d.x2 - d.x1, d.y2 - d.y1);
                
                // Texto com a classe e a porcentagem de confiança
                ctx.fillStyle = color;
                ctx.font = "bold 16px Arial";
                const label = `${d.class_name} ${(d.confidence * 100).toFixed(1)}%`;
                ctx.fillText(label, d.x1, d.y1 > 20 ? d.y1 - 7 : d.y1 + 20);
            });
        }

        function logAlert(msg) {
            const div = document.createElement('div');
            div.className = 'alert-item';
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            alertsList.prepend(div);
            if (alertsList.children.length > 5) alertsList.lastChild.remove();
        }

        function stop() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            if (ws) ws.close();
            video.srcObject = null;
            startBtn.disabled = false; stopBtn.disabled = true;
            ctx.clearRect(0, 0, canvasOverlay.width, canvasOverlay.height);
        }

        startBtn.onclick = start;
        stopBtn.onclick = stop;
    </script>
</body>
</html>
